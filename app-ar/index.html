<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner AR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #container { width: 100%; height: 100%; }
        .status {
            position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8);
            color: white; padding: 15px; border-radius: 8px; z-index: 100; font-size: 13px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .active { background: #4ade80; }
        .inactive { background: #ef4444; }
    </style>
</head>
<body>
    <div id="container"></div>
    <div class="status">
        <div><span class="dot inactive" id="dot"></span><span id="text">Iniciando...</span></div>
    </div>

    <script async src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
    <script async src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script>
        const API_URL = 'http://192.168.40.11:3001/api';
        const TARGETS = 'TURTLE MARK.mind';
        let lastDetect = 0;

        async function start() {
            try {
                document.getElementById('text').textContent = 'Cargando MindAR...';

                const { THREE } = window;
                const { MindARThree } = window.MINDAR.IMAGE;

                const mindarThree = new MindARThree({
                    container: document.getElementById('container'),
                    imageSource: TARGETS
                });

                const { scene, camera, renderer } = mindarThree;

                // Luz
                const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
                scene.add(light);

                document.getElementById('text').textContent = '✅ MindAR Listo';
                document.getElementById('dot').className = 'dot active';

                await mindarThree.start();

                // Detector simple por tamaño de escena
                let detectedOnce = false;
                renderer.setAnimationLoop(() => {
                    renderer.render(scene, camera);
                    
                    // Detectar por cambios en la escena
                    if (!detectedOnce && scene.children.length > 1) {
                        const now = Date.now();
                        if (now - lastDetect > 3000) {
                            lastDetect = now;
                            detectedOnce = true;

                            console.log('✅ Detectado');
                            document.getElementById('text').textContent = '🐢 ¡Tortuga Detectada!';
                            
                            // Enviar a API
                            fetch(`${API_URL}/send-model`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    markerIndex: 0,
                                    markerName: 'Tortuga',
                                    model: 'TURTLE.glb'
                                })
                            }).catch(e => console.log('API error:', e));

                            setTimeout(() => {
                                detectedOnce = false;
                                document.getElementById('text').textContent = '✅ Escaneando...';
                            }, 2000);
                        }
                    }
                });

                console.log('✅ Sistema iniciado');

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('text').textContent = '❌ Error: ' + error.message;
            }
        }

        // Esperar a que carguen las librerías
        window.addEventListener('load', () => {
            // Esperar a MindAR
            const checkMindAR = setInterval(() => {
                if (window.MINDAR && window.THREE) {
                    clearInterval(checkMindAR);
                    start();
                }
            }, 100);
        });
    </script>
</body>
</html>
