<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎯 Scanner AR - Acuario</title>
    
    <!-- Import Map - MindAR v1.2.5 oficial con THREE.js 0.160 -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
        }
    }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }

        #ar-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .status-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            min-width: 300px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
            font-weight: 500;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .dot-active {
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        .dot-inactive {
            background: #ef4444;
        }

        .dot-pending {
            background: #eab308;
            animation: pulse 1.5s infinite;
        }

        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #4ade80;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            z-index: 100;
        }

        .detection-banner {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(74, 222, 128, 0.95);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            z-index: 100;
            animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(74, 222, 128, 0.3);
        }

        .detection-banner.hidden {
            display: none;
        }

        .error-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(200, 30, 30, 0.95);
            color: white;
            padding: 25px 35px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .error-banner h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div id="ar-container"></div>

    <!-- Status Panel -->
    <div class="status-panel">
        <div class="status-row">
            <span class="status-dot dot-pending" id="mindar-dot"></span>
            <span id="mindar-text">Iniciando MindAR...</span>
        </div>
        <div class="status-row">
            <span class="status-dot dot-inactive" id="camera-dot"></span>
            <span id="camera-text">Cámara: Esperando</span>
        </div>
        <div class="status-row">
            <span class="status-dot dot-inactive" id="api-dot"></span>
            <span id="api-text">API: Desconectada</span>
        </div>
    </div>

    <!-- FPS Counter -->
    <div class="fps-counter" id="fps">FPS: 0</div>

    <!-- Detection Banner -->
    <div class="detection-banner hidden" id="detection-banner">
        <span id="detection-content">🐢 Detectado</span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';

        // ==================== CONFIG ====================
        const API_BASE_URL = 'http://192.168.40.11:3001/api';
        const TARGETS_FILE = 'TURTLE MARK.mind';

        const MARKERS = {
            0: { name: 'Tortuga', model: 'TURTLE.glb', icon: '🐢' }
        };

        // ==================== STATE ====================
        let mindarApp = null;
        let apiConnected = false;
        let lastDetectTime = 0;
        let frameCount = 0, fpsTime = Date.now();

        // ==================== UI ====================
        function updateDot(dotId, state) {
            const dot = document.getElementById(dotId);
            dot.className = `status-dot dot-${state}`;
        }

        function updateText(textId, text) {
            document.getElementById(textId).textContent = text;
        }

        function showNotif(icon, name) {
            const banner = document.getElementById('detection-banner');
            const content = document.getElementById('detection-content');
            content.textContent = `${icon} ${name} detectado`;
            banner.classList.remove('hidden');
            setTimeout(() => banner.classList.add('hidden'), 2000);
        }

        function showError(msg) {
            const err = document.createElement('div');
            err.className = 'error-banner';
            err.innerHTML = `<h3>⚠️ Error</h3><p>${msg}</p>`;
            document.body.appendChild(err);
            setTimeout(() => err.remove(), 5000);
        }

        // ==================== API ====================
        async function checkAPI() {
            try {
                const res = await fetch(`${API_BASE_URL}/health`);
                if (res.ok) {
                    apiConnected = true;
                    updateDot('api-dot', 'active');
                    updateText('api-text', '✅ API Conectada');
                    console.log('✅ API OK');
                    return;
                }
            } catch (e) {
                console.log('API check failed:', e.message);
            }
            apiConnected = false;
            updateDot('api-dot', 'inactive');
            updateText('api-text', '❌ API Desconectada');
            setTimeout(checkAPI, 5000);
        }

        async function sendModel(idx, name, model) {
            if (!apiConnected) return;
            try {
                await fetch(`${API_BASE_URL}/send-model`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ markerIndex: idx, markerName: name, model })
                });
                console.log('📤 Enviado:', name);
            } catch (e) {
                console.error('❌ Send failed:', e);
            }
        }

        // ==================== AR INIT ====================
        async function init() {
            try {
                updateText('mindar-text', 'Cargando targets...');

                mindarApp = new MindARThree({
                    container: document.querySelector('#ar-container'),
                    imageSource: TARGETS_FILE,
                    maxTrack: 1
                });

                const { scene, renderer, camera } = mindarApp;

                // Add lights
                const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
                scene.add(light);

                // Event listeners
                Object.keys(MARKERS).forEach(idx => {
                    mindarApp.addEventListener('targetFound', (e) => {
                        if (e.detail.targetIndex == idx) {
                            const m = MARKERS[idx];
                            const now = Date.now();
                            if (now - lastDetectTime > 3000) {
                                lastDetectTime = now;
                                console.log(`✅ ${m.icon} ${m.name}`);
                                showNotif(m.icon, m.name);
                                sendModel(idx, m.name, m.model);
                            }
                        }
                    });
                });

                updateDot('mindar-dot', 'active');
                updateText('mindar-text', '✅ MindAR Listo');
                updateDot('camera-dot', 'active');
                updateText('camera-text', '✅ Cámara Activa');

                checkAPI();

                // Start AR
                await mindarApp.start();

                // Render loop
                renderer.setAnimationLoop(() => {
                    frameCount++;
                    const now = Date.now();
                    if (now - fpsTime > 1000) {
                        document.getElementById('fps').textContent = `FPS: ${frameCount}`;
                        frameCount = 0;
                        fpsTime = now;
                    }
                    renderer.render(scene, camera);
                });

                console.log('✅ Sistema listo');

            } catch (e) {
                console.error('❌ Init error:', e);
                updateDot('mindar-dot', 'inactive');
                updateText('mindar-text', '❌ Error');
                showError(e.message);
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
